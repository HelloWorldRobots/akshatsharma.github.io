    <style>
        body {
            margin: 0;
            background: #111;
            font-family: Arial, Helvetica, sans-serif;
        }

        .open-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #fff;
            background: none;
            border: none;
            z-index: 1001;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
        }

            .open-btn svg {
                width: 32px;
                height: 32px;
                fill: currentColor;
                display: block;
            }

            .open-btn:hover,
            .open-btn:focus {
                color: #04AA6D;
            }

        /* Full-screen overlay / drawer (same behavior as index.html) */
        .overlay {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: rgba(0,0,0, 0.95);
            overflow-x: hidden;
            transition: width 0.35s ease;
        }

            .overlay .closebtn {
                position: absolute;
                top: 20px;
                right: 45px;
                font-size: 60px;
                color: #fff;
                text-decoration: none;
                background: none;
                border: none;
                cursor: pointer;
                padding: 0 12px;
            }
        .overlay-content {
            position: relative;
            top: 25%;
            width: 100%;
            text-align: center;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
            justify-content: flex-start;
        }

        .overlay a,
        .overlay .submenu-toggle {
            padding: 8px;
            text-decoration: none;
            font-size: 36px;
            color: #818181;
            display: block;
            transition: color 0.3s, transform 0.12s;
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }

            .overlay a:hover, .overlay a:focus,
            .overlay .submenu-toggle:hover, .overlay .submenu-toggle:focus {
                color: #f1f1f1;
                transform: translateY(-2px);
            }

        /* Submenu styles */
        .submenu {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .submenu-list {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .submenu.open .submenu-list {
            display: flex;
        }

        .submenu:hover .submenu-list {
            display: flex;
        }

        .submenu-list a {
            font-size: 22px;
            color: #d7d7d7;
            text-decoration: none;
            text-align: center;
        }

        @media screen and (max-height: 450px) {
            .overlay a {
                font-size: 20px
            }

            .overlay .closebtn {
                font-size: 40px;
                top: 15px;
                right: 35px;
            }
        }

        /* Gallery + magnifier styles kept from original */
        .gallery {
            column-count: 3;
            column-gap: 24px;
            padding: 100px 16px 40px 16px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-photo {
            background: #222;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            margin-bottom: 24px;
            display: block;
            break-inside: avoid;
            position: relative;
            padding: 0;
        }

            .gallery-photo img {
                width: 100%;
                height: auto;
                display: block;
                object-fit: contain;
                background: #222;
                cursor: zoom-in;
            }

        @media (max-width: 1000px) {
            .gallery {
                column-count: 2;
            }
        }

        @media (max-width: 700px) {
            .gallery {
                column-count: 1;
                padding: 80px 4vw 24px 4vw;
                gap: 0;
            }

            .gallery-photo {
                border-radius: 6px;
            }
        }

        .img-magnifier-glass {
            position: absolute;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: none;
            width: 100px;
            height: 100px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            z-index: 10;
            background-repeat: no-repeat;
            background-color: rgba(34,34,34,0.1);
            pointer-events: none;
            display: none;
        }

        @media (max-width: 700px) {
            .gallery {
                gap: 12px;
                padding: 80px 4vw 24px 4vw;
            }

            .gallery-photo {
                border-radius: 6px;
            }
        }
    </style>

    <script>
        // Wait for all images to load before initializing magnifier
        function onImagesLoaded(container, callback) {
            const images = container.querySelectorAll('img');
            let loaded = 0;
            const total = images.length;
            if (total === 0) callback();
            images.forEach(function (img) {
                if (img.complete) {
                    loaded++;
                    if (loaded === total) callback();
                } else {
                    img.addEventListener('load', function () {
                        loaded++;
                        if (loaded === total) callback();
                    });
                    img.addEventListener('error', function () {
                        loaded++;
                        if (loaded === total) callback();
                    });
                }
            });
        }

        function magnify(img, zoom) {
            let glass = document.createElement("DIV");
            glass.setAttribute("class", "img-magnifier-glass");
            img.parentElement.appendChild(glass);

            const glassSize = 100;
            const bw = 2;
            const w = glassSize / 2;
            const h = glassSize / 2;

            glass.style.width = glassSize + "px";
            glass.style.height = glassSize + "px";
            glass.style.backgroundImage = "url('" + img.src + "')";
            glass.style.backgroundSize = (img.width * zoom) + "px " + (img.height * zoom) + "px";

            function moveMagnifier(e) {
                let pos = getCursorPos(e);
                let x = pos.x;
                let y = pos.y;
                if (x > img.width - (w / zoom)) { x = img.width - (w / zoom); }
                if (x < w / zoom) { x = w / zoom; }
                if (y > img.height - (h / zoom)) { y = img.height - (h / zoom); }
                if (y < h / zoom) { y = h / zoom; }
                glass.style.left = (x - w) + "px";
                glass.style.top = (y - h) + "px";
                glass.style.backgroundPosition = "-" + ((x * zoom) - w + bw) + "px -" + ((y * zoom) - h + bw) + "px";
            }
            function getCursorPos(e) {
                let a = img.getBoundingClientRect();
                let x = e.pageX - a.left - window.pageXOffset;
                let y = e.pageY - a.top - window.pageYOffset;
                return { x: x, y: y };
            }
            img.addEventListener("mousemove", function (e) {
                glass.style.display = "block";
                moveMagnifier(e);
            });
            img.addEventListener("mouseleave", function () {
                glass.style.display = "none";
            });
            img.addEventListener("mouseenter", function (e) {
                glass.style.display = "block";
                moveMagnifier(e);
            });
            // Touch support
            img.addEventListener("touchmove", function (e) {
                glass.style.display = "block";
                moveMagnifier(e.touches[0]);
            });
            img.addEventListener("touchend", function () {
                glass.style.display = "none";
            });
        }

        // Initialize magnifier after all images are loaded
        onImagesLoaded(document.querySelector('.gallery'), function () {
            document.querySelectorAll('.gallery-photo img').forEach(function (img) {
                magnify(img, 2.5);
            });
        });

        // Drawer functions (copied from index.html behavior)
        function openNav() {
            const nav = document.getElementById("myNav");
            if (!nav) return;
            nav.style.width = "100%";
            nav.setAttribute("aria-hidden", "false");
            document.body.classList.add("overlay-open");
        }
        function closeNav() {
            const nav = document.getElementById("myNav");
            if (!nav) return;
            nav.style.width = "0%";
            nav.setAttribute("aria-hidden", "true");
            document.body.classList.remove("overlay-open");

            // reset submenu state
            const submenu = document.getElementById('photographySubmenu');
            if (submenu) submenu.classList.remove('open');
            const toggle = document.getElementById('submenuToggle');
            const list = document.getElementById('submenuList');
            if (toggle) toggle.setAttribute('aria-expanded', 'false');
            if (list) list.setAttribute('aria-hidden', 'true');
        }

        // Accessibility: close on Escape
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeNav();
        });

        // Close drawer when clicking on the overlay background
        document.getElementById('myNav').addEventListener('click', function (e) {
            if (e.target === this) closeNav();
        });

        // Submenu toggle for touch devices / explicit control
        (function () {
            const submenu = document.getElementById('photographySubmenu');
            const toggle = document.getElementById('submenuToggle');
            const list = document.getElementById('submenuList');

            if (!toggle || !submenu) return;

            toggle.addEventListener('click', function (e) {
                // On touch / small screens toggle submenu instead of navigating immediately
                if (window.matchMedia('(hover: none)').matches || window.innerWidth < 900) {
                    e.preventDefault();
                    const isOpen = submenu.classList.toggle('open');
                    toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
                    list.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
                } else {
                    // On pointer devices allow the Photography link to navigate to gallery
                }
            });
        })();
    </script>
